system:
  name: Ultralite Code Assistant
  version: 0.1.0
  log_level: INFO
base_model:
  path: models/qwen2.5-coder-0.5b-instruct-q4_k_m.gguf
  context_length: 4096
  gpu_layers: 99
  threads: 8
  temperature: 0.2
  max_tokens: 512
  batch_size: 512
router:
  mode: hybrid
  max_active_modules: 2
  default_modules:
  - code_gen
  rules:
  - keywords:
    - write
    - create
    - implement
    - build
    - generate
    - make
    - add
    - function
    - class
    - script
    module: code_gen
    priority: 12
  - keywords:
    - review
    - check
    - audit
    - improve
    - refactor
    - optimize
    - clean
    - simplify
    module: code_review
    priority: 10
  - keywords:
    - bug
    - fix
    - error
    - broken
    - crash
    - debug
    - wrong
    - fails
    - issue
    - traceback
    - exception
    module: debugger
    priority: 11
  - keywords:
    - explain
    - how
    - why
    - what does
    - understand
    - teach
    - learn
    - difference
    module: explainer
    priority: 8
  classifier:
    type: neural
    model_path: data/router_model
    min_training_samples: 10
    confidence_threshold: 0.4
    retrain_interval: 50
    max_features: 5000
    embedding_model: all-MiniLM-L6-v2
  blending:
    enabled: true
    strategy: weighted
    max_blend_modules: 2
    conflict_resolution: priority
    weight_decay: 0.7
augmentors:
  enabled: true
  mode: auto
  examples_dir: data/augmentor_examples
  model_size_threshold: 1500
  failure_routing: true
modules:
  directory: modules
  cache_ttl: 300
  max_cached: 5
  predictive_preload: true
  preload_top_k: 2
memory:
  enabled: true
  short_term:
    max_turns: 30
    max_tokens: 2048
  long_term:
    enabled: true
    backend: faiss
    storage_dir: data/memory
    top_k: 5
    similarity_threshold: 0.3
    embedding_model: all-MiniLM-L6-v2
  system:
    enabled: true
    knowledge_dir: data/knowledge
  compressor:
    max_summary_sentences: 10
    max_topics: 8
fusion:
  mode: lean
  chat_format: chatml
  system_prompt: You are a coding assistant. Write clean, correct Python in ```python
    blocks.
  max_prompt_tokens: 2048
  budget_system: 0.05
  budget_modules: 0.1
  budget_memory: 0.1
  budget_conversation: 0.55
  budget_reserve: 0.2
pipeline:
  enabled: true
  parallel_workers: 3
  enable_generation_queue: true
  generation_timeout: 180
kv_cache:
  enabled: true
  compression_threshold: 0.8
micro_adapters:
  enabled: true
  storage_dir: data/adapters
  embedding_model: all-MiniLM-L6-v2
  min_cluster_size: 5
  max_adapters: 8
  regenerate_interval: 20
project_context:
  enabled: true
  storage_dir: data/project_index
  top_k: 5
  similarity_threshold: 0.35
  max_chunk_lines: 40
  overlap_lines: 5
  max_file_size_kb: 500
npc:
  enabled: false
digest:
  enabled: true
  topics_dir: digest/topics
  grammars_dir: data/digest_grammars
  examples_dir: data/augmentor_examples/curation
  max_selections: 10
  max_takeaways: 4
  compact_summary_chars: 100
speculative:
  # Native speculative decoding via llama-cpp-python's draft_model kwarg.
  # Disabled by default. Safe to enable with mode=prompt_lookup for any model.
  #
  # Use mode=draft_model only when base and draft share a tokenizer family AND
  # come from the same training lineage. Vocab match is necessary but not
  # sufficient — Gemma 2 2B fails to draft Gemma 2 9B despite shared vocab
  # because the training data diverges. See ggml-org/llama.cpp discussion
  # #10466 for reports of 2.5x speedup on code with Qwen 0.5B -> 14B/32B.
  enabled: false
  mode: prompt_lookup   # prompt_lookup | draft_model
  # prompt_lookup params:
  num_pred_tokens: 10
  max_ngram_size: 2
  # draft_model params (unused unless mode=draft_model):
  #   Default points at the Qwen 2.5 Coder 0.5B — community benchmarks on
  #   llama.cpp report 0.5B as the sweet spot for drafting 14B+ targets
  #   within the same family (~2.5x on coding tasks). The 1.5B also works
  #   but is slower and uses more VRAM without a proportional speedup.
  draft_model_path: ""  # e.g., models/qwen2.5-coder-0.5b-instruct-q4_k_m.gguf
  draft_gpu_layers: 99
  draft_context_length: 4096
