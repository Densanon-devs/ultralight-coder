domain: sql
category: sql_schema
examples:
  - query: |
      Write SQL to create a users table with an auto-incrementing primary key, email with unique constraint, and timestamps.
    solution: |
      ```sql
      CREATE TABLE users (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        email TEXT NOT NULL UNIQUE,
        name TEXT NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );
      ```
    tags: [sql, create-table, primary-key, unique, timestamp]
    difficulty: easy

  - query: |
      Write SQL to create an orders table with a foreign key to users and an index on the date column.
    solution: |
      ```sql
      CREATE TABLE orders (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        user_id INTEGER NOT NULL REFERENCES users(id),
        amount DECIMAL(10, 2) NOT NULL,
        status TEXT NOT NULL DEFAULT 'pending',
        ordered_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE INDEX idx_orders_user_id ON orders(user_id);
      CREATE INDEX idx_orders_ordered_at ON orders(ordered_at);
      ```
    tags: [sql, create-table, foreign-key, index]
    difficulty: easy

  - query: |
      Write a SQL migration that adds a column to an existing table and backfills it.
    solution: |
      ```sql
      ALTER TABLE users ADD COLUMN status TEXT NOT NULL DEFAULT 'active';

      UPDATE users SET status = 'inactive'
      WHERE id NOT IN (
        SELECT DISTINCT user_id FROM orders
        WHERE ordered_at > datetime('now', '-1 year')
      );
      ```
    tags: [sql, alter-table, migration, update]
    difficulty: medium

  - query: |
      Write SQL to create a many-to-many relationship between posts and tags.
    solution: |
      ```sql
      CREATE TABLE posts (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        title TEXT NOT NULL,
        body TEXT NOT NULL
      );

      CREATE TABLE tags (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        name TEXT NOT NULL UNIQUE
      );

      CREATE TABLE post_tags (
        post_id INTEGER NOT NULL REFERENCES posts(id),
        tag_id INTEGER NOT NULL REFERENCES tags(id),
        PRIMARY KEY (post_id, tag_id)
      );

      CREATE INDEX idx_post_tags_tag ON post_tags(tag_id);
      ```
    tags: [sql, many-to-many, junction-table, foreign-key]
    difficulty: medium
