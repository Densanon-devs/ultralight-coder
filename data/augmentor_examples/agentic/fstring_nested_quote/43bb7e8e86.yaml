    # Triggered failure: fstring_nested_quote'
  solution: "Python 3.10/3.11 cannot parse a single-quoted f-string containing another\n\
    single-quoted string literal inside its `{ }` block. Same rule for\ndouble-quoted\
    \ f-strings with embedded double-quoted literals.\n\nWRONG (Python 3.10 SyntaxError\
    \ — inner `'` closes outer `'`):\n\n    print(f'{todo.id}: {'Done' if todo.done\
    \ else 'Pending'}')\n\nRIGHT — flip the outer quote style:\n\n    print(f\"{todo.id}:\
    \ {'Done' if todo.done else 'Pending'}\")\n\nOr extract the value before the f-string:\n\
    \n    label = 'Done' if todo.done else 'Pending'\n    print(f'{todo.id}: {label}')\n\
    \nDefault: when an f-string contains string literals inside `{...}`, use\ndouble-quoted\
    \ f-string + single-quoted inner literals.\n"
