  solution: "When writing multi-line Python files via the agent's write_file tool,\n\
    ALWAYS use the array form for `content`. One element per line. Inner\nsingle-quoted\
    \ Python strings stay natural — no JSON escape gymnastics.\n\nWRONG (single string\
    \ with embedded `'r'` — JSON parser rejects):\n\n    <tool_call>{\"name\": \"\
    write_file\", \"arguments\": {\"path\": \"x.py\",\n      \"content\": \"with open('x',\
    \ 'r') as f:\\n    pass\\n\"}}</tool_call>\n\nRIGHT (array form, one line per\
    \ element):\n\n    <tool_call>{\"name\": \"write_file\", \"arguments\": {\"path\"\
    : \"x.py\",\n      \"content\": [\"with open('x', 'r') as f:\", \"    pass\"]}}</tool_call>\n\
    \nThe array form sidesteps the entire JSON-escape pain by treating each\nelement\
    \ as a complete line. Joins with \\n at write time. Use it for\nANY file with\
    \ 5+ lines OR any embedded `\"` characters.\n"
