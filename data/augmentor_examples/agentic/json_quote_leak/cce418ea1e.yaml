    \ element):\n\n    <tool_call>{\"name\": \"write_file\", \"arguments\": {\"path\"\
    : \"x.py\",\n      \"content\": [\"with open('x', 'r') as f:\", \"    pass\"]}}</tool_call>\n\
    \nThe array form sidesteps the entire JSON-escape pain by treating each\nelement\
    \ as a complete line. Joins with \\n at write time. Use it for\nANY file with\
