  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Scaling Laws for Precision in Mixture-of-Experts Models"
      Source: ArXiv cs.LG
      Summary: "We derive scaling laws governing how numerical precision affects MoE model quality as expert count and model size increase. Lower precision degrades routing decisions disproportionately compared to dense layers..."
    solution: |
      {"takeaways": ["Establishes that MoE routing layers are more sensitive to quantization than dense FFN blocks, requiring higher precision for routers even when experts are aggressively quantized.", "Provides concrete scaling formulas teams can use to predict quality loss when deploying large MoE models at reduced precision.", "Directly actionable for anyone shipping quantized MoE models — route in FP16, compute in INT4 may be the practical takeaway."]}
    tags: [curation, takeaway, research]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "A Survey of Code Generation with Large Language Models: Challenges, Benchmarks, and Beyond"
      Source: ArXiv cs.SE
      Summary: "We provide a comprehensive survey of 200+ papers on LLM-based code generation, covering benchmarks (HumanEval, MBPP, SWE-bench), training strategies, evaluation metrics, and open challenges..."
    solution: |
      {"takeaways": ["Catalogues 200+ papers across code generation benchmarks, training methods, and evaluation — the most complete map of the field to date.", "Highlights that benchmark saturation on HumanEval/MBPP is driving the community toward harder, repo-level benchmarks like SWE-bench.", "Identifies test-time compute, long-context grounding, and multi-file editing as the three least-solved open problems."]}
    tags: [curation, takeaway, research]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "RepoGraph: Enhancing LLM Code Completion with Repository-Level Context Graphs"
      Source: ArXiv cs.SE
      Summary: "We propose RepoGraph, a method that builds dependency graphs from entire repositories and injects structured context into LLM prompts for code completion. Evaluated on CrossCodeEval and RepoEval, RepoGraph improves completion accuracy by 12-18% over file-level baselines..."
    solution: |
      {"takeaways": ["Builds repository-level dependency graphs and injects them as structured context, yielding 12-18% accuracy gains over file-level baselines.", "Method is model-agnostic — works as a retrieval layer in front of any code LLM, including small local models.", "Code and evaluation scripts released, making it straightforward to reproduce and integrate into existing pipelines."]}
    tags: [curation, takeaway, research]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "BioRobot: A Soft Continuum Manipulator Inspired by Elephant Trunk Musculature"
      Source: ArXiv cs.RO
      Summary: "We present BioRobot, a pneumatically actuated soft continuum manipulator modeled on elephant trunk muscle architecture. The robot achieves 6-DOF manipulation in constrained spaces where rigid arms cannot operate..."
    solution: |
      {"takeaways": ["Demonstrates a soft continuum manipulator achieving 6-DOF control in confined spaces, directly inspired by elephant trunk musculature.", "Pneumatic actuation enables compliance that rigid manipulators lack, opening applications in surgical assistance and field repair.", "Hardware design files and control software are open-sourced, lowering the replication barrier for soft robotics labs."]}
    tags: [curation, takeaway, research]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Cross-Domain Transfer Learning for Low-Resource Sentiment Analysis in African Languages"
      Source: ArXiv cs.CL
      Summary: "We investigate transfer learning strategies for sentiment analysis across 12 African languages with limited labeled data. A multilingual adapter approach outperforms full fine-tuning by 8 points F1 on average..."
    solution: |
      {"takeaways": ["Multilingual adapters outperform full fine-tuning by 8 F1 points for low-resource African language sentiment analysis — a strong argument for parameter-efficient methods.", "Covers 12 languages, providing the broadest cross-African-language sentiment benchmark to date.", "Practical implication: teams can add a new language with a few hundred labeled examples and a lightweight adapter, no full retraining required."]}
    tags: [curation, takeaway, research]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Emergent World Models in Maze-Solving Transformers: Evidence from Probing and Intervention"
      Source: ArXiv cs.LG
      Summary: "We train small transformers to solve procedurally generated mazes and probe whether they develop internal spatial representations. Linear probes recover accurate 2D maps from intermediate activations, and targeted activation editing redirects navigation..."
    solution: |
      {"takeaways": ["Small transformers trained on maze-solving develop recoverable 2D spatial representations in intermediate layers — genuine world models, not just pattern matching.", "Activation editing can redirect the model's navigation path, confirming the representations are causally used, not epiphenomenal.", "Adds to growing evidence that even modest-scale transformers build structured internal models when the task demands spatial reasoning."]}
    tags: [curation, takeaway, research]
    difficulty: medium
