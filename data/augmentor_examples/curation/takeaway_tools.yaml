      Summary: "New release of Claude Code CLI tool with /powerup feature and various improvements."
    solution: |
      {"takeaways": ["Ships /powerup feature — a workflow-level capability addition, not a routine patch.", "Rapid v2.1.x cadence signals continued active development.", "Teams running Claude Code in CI should track the changelog closely."]}
    tags: [curation, takeaway, tools]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Godot 4.6.2"
      Source: Godot Engine
      Summary: "Maintenance release, bug fixes only."
    solution: |
      {"takeaways": ["Godot 4.6.2 is a stability release — no new features, purely hardening for production.", "Recommended update for teams shipping on 4.6; maintenance releases are generally low-risk.", "Continued rapid cadence reflects health of Godot's contributor ecosystem."]}
    tags: [curation, takeaway, tools]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "PlayCanvas Can Now Load 4D Gaussian Splats"
      Source: 80 Level
      Summary: "PlayCanvas adds support for 4D Gaussian Splats, enabling volumetric video playback with a time dimension in browser-based 3D environments."
    solution: |
      {"takeaways": ["Added support for 4D Gaussian Splats — volumetric video with time dimension, enabling playback in browser-based 3D.", "Photorealistic volumetric video in a browser without plugins — opens doors for virtual production and marketing.", "Gaussian splatting continues to mature; its arrival in a WebGL engine signals the toolchain is production-ready."]}
