  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Why Nvidia poured $2B into Marvell"
      Source: Tom's Hardware
      Summary: "NVLink Fusion partnership."
    solution: |
      {"takeaways": ["Nvidia's $2B investment is about locking custom ASIC designs into its NVLink interconnect ecosystem.", "Ensures Nvidia's networking stack stays central even as hyperscalers build their own AI silicon.", "Ecosystem play: trades competitive ground in chip design for interconnect layer control."]}
    tags: [curation, takeaway, industry]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Anthropic raises $3.5B Series E at $62B valuation"
      Source: TechCrunch
      Summary: "Anthropic closed a $3.5B Series E round led by Lightspeed Venture Partners and Spark Capital, valuing the company at $62B. Funds will be used to scale compute infrastructure and expand enterprise offerings."
    solution: |
      {"takeaways": ["Anthropic's $62B valuation cements its position as the second-most-valuable AI lab behind OpenAI.", "Capital earmarked for compute and enterprise — signals the race is increasingly about infrastructure scale, not just model quality.", "Fundraise comes amid growing enterprise demand for Claude, suggesting revenue trajectory supports the valuation."]}
    tags: [curation, takeaway, industry]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Stability AI lays off 30% of workforce, pivots to enterprise licensing"
      Source: The Information
      Summary: "Stability AI is cutting roughly 30% of staff and shifting focus from open-source image generation to enterprise licensing deals for its diffusion models. CEO cited unsustainable burn rate and need to reach profitability."
    solution: |
      {"takeaways": ["Stability AI cutting 30% of staff and pivoting from open-source to enterprise licensing — a sharp strategic reversal.", "Open-source generative AI proving difficult to monetize at scale; Stability joins a growing list of startups tightening access.", "Remaining open-source community forks will likely continue development independently, but without Stability's compute backing."]}
    tags: [curation, takeaway, industry]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Apple launches on-device LLM for Siri, no cloud required"
      Source: The Verge
      Summary: "Apple announced that iOS 20 will run a 3B parameter language model entirely on-device for Siri interactions, with no data leaving the phone. The model handles general Q&A, summarization, and app control without cloud fallback."
    solution: |
      {"takeaways": ["Apple shipping a 3B on-device LLM for Siri in iOS 20 — the largest consumer deployment of local inference to date.", "No cloud fallback for core tasks positions Apple as the privacy-first AI platform, a deliberate contrast with Google and Microsoft.", "Sets a floor for on-device model quality that every mobile AI competitor must now match or exceed."]}
    tags: [curation, takeaway, industry]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "EU AI Act enforcement begins: first fines issued to non-compliant providers"
      Source: Reuters
      Summary: "The European Union has issued its first enforcement actions under the AI Act, fining two companies for deploying high-risk AI systems without required conformity assessments. Fines totaled EUR 15M."
    solution: |
      {"takeaways": ["First EU AI Act fines signal the regulation has teeth — EUR 15M penalties for missing conformity assessments on high-risk systems.", "Companies deploying AI in the EU now face concrete compliance costs, not just theoretical risk.", "Expect a rush of AI governance hiring and third-party audit demand as enforcement broadens beyond these initial cases."]}
    tags: [curation, takeaway, industry]
    difficulty: medium
