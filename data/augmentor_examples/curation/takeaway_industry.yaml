    solution: |
      {"takeaways": ["French advocacy group filed suit citing laws protecting consumers' right to use purchased software.", "Directly tied to Stop Killing Games campaign with 1.3M signatures — public pressure now has legal backing.", "Potentially the most consequential challenge yet to publishers deactivating paid games via server shutdown."]}
