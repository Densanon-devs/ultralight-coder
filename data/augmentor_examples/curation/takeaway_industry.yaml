examples:
  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Qwen3.6-Plus"
      Source: r/LocalLLaMA
      Summary: "Blog post about new model release. 569 upvotes, 155 comments."
    solution: |
      {"takeaways": ["Qwen3.6-Plus generating significant buzz as a strong mid-size open model release, with benchmarks suggesting competitive performance against models twice its size.", "Continues Alibaba's aggressive open-weight cadence, maintaining pressure on Western frontier labs.", "Community reports highlight strong reasoning and instruction-following at quantized sizes relevant for local deployment."]}
    tags: [curation, takeaway, industry]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "The Bonsai 1-bit models are very good"
      Source: r/LocalLLaMA
      Summary: "Tim from AnythingLLM testing PrismML Bonsai 1-bit. 716 upvotes, 121 comments."
    solution: |
      {"takeaways": ["Bonsai 1-bit models earning unusually strong reviews — top post of the day — with quality defying expectations for extreme quantization.", "1-bit models represent a potential step-change for edge deployment: VRAM and bandwidth requirements drop dramatically.", "Combined with TurboQuant, 2026's local LLM story may be less about parameter counts and more about compression breakthroughs."]}
    tags: [curation, takeaway, industry]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "Scientists Build Living Robots With Nervous Systems"
      Source: IEEE Spectrum
      Summary: "Researchers at Tufts University have constructed small bio-hybrid robots using living neural tissue integrated with synthetic scaffolds, creating machines that can sense and adapt to their environment using biological nervous systems."
    solution: |
      {"takeaways": ["Engineers constructing robots from biological neural components — a fundamental departure from conventional robotics.", "Living nervous systems offer adaptive, low-power sensing that electronics cannot replicate at small scales.", "Raises immediate bioethics, longevity, and maintenance questions as the technology moves beyond the lab."]}
    tags: [curation, takeaway, industry]
    difficulty: medium

  - query: |
      Write 2-4 takeaway bullets for this article:
      Title: "French consumer group sues Ubisoft over shutdown of The Crew"
      Source: Game Developer
