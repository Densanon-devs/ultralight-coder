domain: cli
category: cli_subprocess
examples:
  - query: |
      Safe subprocess runner that captures stdout/stderr, handles timeouts, and returns a result object with returncode, output, and error.
    solution: |
      ```python
      import subprocess
      from dataclasses import dataclass

      @dataclass
      class CmdResult:
          returncode: int
          output: str
          error: str
          timed_out: bool = False

      def run_cmd(cmd, timeout=30):
          try:
              proc = subprocess.run(
                  cmd, capture_output=True, text=True, timeout=timeout
              )
              return CmdResult(proc.returncode, proc.stdout, proc.stderr)
          except subprocess.TimeoutExpired:
              return CmdResult(-1, "", "Command timed out", timed_out=True)
          except FileNotFoundError:
              return CmdResult(-1, "", f"Command not found: {cmd[0]}")

      if __name__ == "__main__":
          r = run_cmd(["echo", "hello world"])
          print(f"rc={r.returncode} out={r.output.strip()}")
          r2 = run_cmd(["sleep", "10"], timeout=1)
          print(f"timed_out={r2.timed_out}")
      ```
  - query: |
      Pipeline two shell commands: run command A, pipe its stdout into command B, and capture the final result.
    solution: |
      ```python
      import subprocess

      def pipe_commands(cmd_a, cmd_b):
          p1 = subprocess.Popen(
              cmd_a, stdout=subprocess.PIPE, stderr=subprocess.PIPE
          )
          p2 = subprocess.Popen(
              cmd_b, stdin=p1.stdout, stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
          )
          p1.stdout.close()
          out, err = p2.communicate()
          p1.wait()
          return p2.returncode, out.decode(), err.decode()

      if __name__ == "__main__":
          rc, out, err = pipe_commands(
              ["echo", "one\ntwo\nthree\none"],
              ["sort", "-u"],
          )
          print(f"rc={rc}\n{out}")
      ```
