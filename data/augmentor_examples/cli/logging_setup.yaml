domain: cli
category: cli_logging
examples:
  - query: |
      Logging setup function with file and console handlers, custom formatter, and configurable log level.
    solution: |
      ```python
      import logging
      import sys

      def setup_logging(level="INFO", log_file="app.log"):
          logger = logging.getLogger("app")
          logger.setLevel(getattr(logging, level.upper()))

          fmt = logging.Formatter(
              "%(asctime)s [%(levelname)s] %(name)s: %(message)s",
              datefmt="%Y-%m-%d %H:%M:%S",
          )

          ch = logging.StreamHandler(sys.stderr)
          ch.setFormatter(fmt)
          logger.addHandler(ch)

          fh = logging.FileHandler(log_file)
          fh.setFormatter(fmt)
          logger.addHandler(fh)

          return logger

      if __name__ == "__main__":
          log = setup_logging(level="DEBUG")
          log.debug("debug message")
          log.info("server started")
          log.error("something broke")
      ```
  - query: |
      Rotating log file setup using RotatingFileHandler that limits file size and keeps N backup files.
    solution: |
      ```python
      import logging
      from logging.handlers import RotatingFileHandler

      def setup_rotating_log(path="app.log", max_bytes=5_000_000, backups=3):
          logger = logging.getLogger("app")
          logger.setLevel(logging.DEBUG)

          fmt = logging.Formatter("%(asctime)s %(levelname)s %(message)s")

          handler = RotatingFileHandler(
              path, maxBytes=max_bytes, backupCount=backups
          )
          handler.setFormatter(fmt)
          logger.addHandler(handler)

          return logger

      if __name__ == "__main__":
          log = setup_rotating_log(max_bytes=1_000, backups=2)
          for i in range(500):
              log.info(f"Log entry number {i}")
          print("Done. Check app.log, app.log.1, app.log.2")
      ```
