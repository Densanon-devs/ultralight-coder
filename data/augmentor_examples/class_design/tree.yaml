domain: class_design
category: pattern_tree
examples:
  - query: |
      Write a BST class with insert, search, delete (all 3 cases),
      inorder() returning a sorted list, and height() returning tree height
      (empty=0, single node=1).
    solution: |
      ```python
      class _Node:
          def __init__(self, key):
              self.key = key
              self.left = None
              self.right = None


      class BST:
          def __init__(self):
              self._root = None

          def insert(self, key):
              self._root = self._insert(self._root, key)

          def _insert(self, node, key):
              if node is None:
                  return _Node(key)
              if key < node.key:
                  node.left = self._insert(node.left, key)
              elif key > node.key:
                  node.right = self._insert(node.right, key)
              return node

          def search(self, key):
              node = self._root
              while node:
                  if key == node.key:
                      return True
                  node = node.left if key < node.key else node.right
              return False

          def delete(self, key):
              self._root = self._delete(self._root, key)

          def _delete(self, node, key):
              if node is None:
                  return None
              if key < node.key:
                  node.left = self._delete(node.left, key)
              elif key > node.key:
                  node.right = self._delete(node.right, key)
              else:
                  if node.left is None:
                      return node.right
                  if node.right is None:
                      return node.left
                  successor = node.right
                  while successor.left:
                      successor = successor.left
                  node.key = successor.key
                  node.right = self._delete(node.right, successor.key)
              return node

          def inorder(self):
              result = []
              self._inorder(self._root, result)
              return result

          def _inorder(self, node, result):
              if node:
                  self._inorder(node.left, result)
                  result.append(node.key)
                  self._inorder(node.right, result)

          def height(self):
              return self._height(self._root)

          def _height(self, node):
              if node is None:
                  return 0
              return 1 + max(self._height(node.left), self._height(node.right))
      ```

      Key patterns:
      1. _Node stores key, left, right
      2. insert/delete use recursive helpers that RETURN the node (enables reassignment)
      3. delete 3 cases: leaf (return None), one child (return the child), two children (replace with in-order successor then delete successor)
      4. search uses iterative loop (no recursion needed)
      5. inorder collects into a result list via recursive helper
      6. height: empty=0, leaf=1, recursive max(left,right)+1
      7. delete of non-existent key is a no-op (node is None -> return None)
    tags: [bst, binary-search-tree, delete, inorder, height, recursive]
    difficulty: hard

  - query: |
      Write a Trie (prefix tree) with insert, search, and starts_with methods.
    solution: |
      ```python
      class TrieNode:
          def __init__(self):
              self.children = {}
              self.is_end = False


      class Trie:
          def __init__(self):
              self._root = TrieNode()

          def insert(self, word):
              node = self._root
              for ch in word:
                  if ch not in node.children:
                      node.children[ch] = TrieNode()
                  node = node.children[ch]
              node.is_end = True

          def search(self, word):
              node = self._find(word)
              return node is not None and node.is_end

          def starts_with(self, prefix):
              return self._find(prefix) is not None

          def _find(self, prefix):
              node = self._root
              for ch in prefix:
                  if ch not in node.children:
                      return None
                  node = node.children[ch]
              return node
      ```

      Key: insert creates nodes on the fly. search checks is_end. starts_with only checks node existence. _find is shared helper.
    tags: [trie, prefix-tree, search, insert]
    difficulty: medium

  - query: |
      Write a BinaryTree class built from nested tuples (value, left, right)
      with preorder, inorder, postorder, and level_order traversal methods.
    solution: |
      ```python
      from collections import deque


      class BinaryTree:
          def __init__(self, data):
              if data is None:
                  self.value = None
                  self.left = None
                  self.right = None
              elif isinstance(data, tuple):
                  val, left, right = data
                  self.value = val
                  self.left = BinaryTree(left) if left else None
                  self.right = BinaryTree(right) if right else None
              else:
                  self.value = data
                  self.left = None
                  self.right = None

          def preorder(self):
              result = [self.value]
              if self.left: result.extend(self.left.preorder())
              if self.right: result.extend(self.right.preorder())
              return result

          def inorder(self):
              result = []
              if self.left: result.extend(self.left.inorder())
              result.append(self.value)
              if self.right: result.extend(self.right.inorder())
              return result

          def postorder(self):
              result = []
              if self.left: result.extend(self.left.postorder())
              if self.right: result.extend(self.right.postorder())
              result.append(self.value)
              return result

          def level_order(self):
              result = []
              q = deque([self])
              while q:
                  node = q.popleft()
                  if node:
                      result.append(node.value)
                      if node.left: q.append(node.left)
                      if node.right: q.append(node.right)
              return result
      ```

      Key: __init__ recursively builds from (value, left, right) tuples. preorder=root-left-right, inorder=left-root-right, postorder=left-right-root, level_order=BFS with deque.
    tags: [binary-tree, traversal, preorder, inorder, postorder, bfs]
    difficulty: medium

  - query: |
      Write an AVL tree (self-balancing BST) with insert, delete, search,
      and inorder methods. Include left/right rotations to maintain balance.
      Height difference between subtrees must never exceed 1.
    solution: |
      ```python
      class _AVLNode:
          def __init__(self, key):
              self.key = key
              self.left = None
              self.right = None
              self.height = 1


      class AVLTree:
          def __init__(self):
              self._root = None

          def _height(self, node):
              return node.height if node else 0

          def _balance_factor(self, node):
              return self._height(node.left) - self._height(node.right)

          def _update_height(self, node):
              node.height = 1 + max(self._height(node.left),
                                    self._height(node.right))

          def _rotate_right(self, y):
              x = y.left
              t = x.right
              x.right = y
              y.left = t
              self._update_height(y)
              self._update_height(x)
              return x

          def _rotate_left(self, x):
              y = x.right
              t = y.left
              y.left = x
              x.right = t
              self._update_height(x)
              self._update_height(y)
              return y

          def _rebalance(self, node):
              self._update_height(node)
              bf = self._balance_factor(node)
              if bf > 1:
                  if self._balance_factor(node.left) < 0:
                      node.left = self._rotate_left(node.left)
                  return self._rotate_right(node)
              if bf < -1:
                  if self._balance_factor(node.right) > 0:
                      node.right = self._rotate_right(node.right)
                  return self._rotate_left(node)
              return node

          def insert(self, key):
              self._root = self._insert(self._root, key)

          def _insert(self, node, key):
              if node is None:
                  return _AVLNode(key)
              if key < node.key:
                  node.left = self._insert(node.left, key)
              elif key > node.key:
                  node.right = self._insert(node.right, key)
              else:
                  return node
              return self._rebalance(node)

          def delete(self, key):
              self._root = self._delete(self._root, key)

          def _delete(self, node, key):
              if node is None:
                  return None
              if key < node.key:
                  node.left = self._delete(node.left, key)
              elif key > node.key:
                  node.right = self._delete(node.right, key)
              else:
                  if node.left is None:
                      return node.right
                  if node.right is None:
                      return node.left
                  successor = node.right
                  while successor.left:
                      successor = successor.left
                  node.key = successor.key
                  node.right = self._delete(node.right, successor.key)
              return self._rebalance(node)

          def search(self, key):
              node = self._root
              while node:
                  if key == node.key:
                      return True
                  node = node.left if key < node.key else node.right
              return False

          def inorder(self):
              result = []
              self._inorder(self._root, result)
              return result

          def _inorder(self, node, result):
              if node:
                  self._inorder(node.left, result)
                  result.append(node.key)
                  self._inorder(node.right, result)
      ```

      Key patterns:
      1. Each node stores its height; balance factor = left height - right height
      2. Four rotation cases: LL (right rotate), RR (left rotate), LR (left-right), RL (right-left)
      3. _rebalance called after every insert/delete to maintain |balance factor| <= 1
      4. Insert and delete are identical to BST but with rebalance on the return path
      5. O(log n) guaranteed for all operations due to height balancing
    tags: [avl-tree, balanced-bst, rotation, self-balancing, recursive]
    difficulty: hard

  - query: |
      Write a SegmentTree class that supports range sum queries and point
      updates on an array. Methods: build(arr), update(index, value),
      query(left, right) returning sum of arr[left..right] inclusive.
    solution: |
      ```python
      class SegmentTree:
          def __init__(self, arr):
              self._n = len(arr)
              self._tree = [0] * (4 * self._n)
              if self._n > 0:
                  self._build(arr, 1, 0, self._n - 1)

          def _build(self, arr, node, start, end):
              if start == end:
                  self._tree[node] = arr[start]
                  return
              mid = (start + end) // 2
              self._build(arr, 2 * node, start, mid)
              self._build(arr, 2 * node + 1, mid + 1, end)
              self._tree[node] = self._tree[2 * node] + self._tree[2 * node + 1]

          def update(self, index, value):
              self._update(1, 0, self._n - 1, index, value)

          def _update(self, node, start, end, index, value):
              if start == end:
                  self._tree[node] = value
                  return
              mid = (start + end) // 2
              if index <= mid:
                  self._update(2 * node, start, mid, index, value)
              else:
                  self._update(2 * node + 1, mid + 1, end, index, value)
              self._tree[node] = self._tree[2 * node] + self._tree[2 * node + 1]

          def query(self, left, right):
              return self._query(1, 0, self._n - 1, left, right)

          def _query(self, node, start, end, left, right):
              if right < start or end < left:
                  return 0
              if left <= start and end <= right:
                  return self._tree[node]
              mid = (start + end) // 2
              left_sum = self._query(2 * node, start, mid, left, right)
              right_sum = self._query(2 * node + 1, mid + 1, end, left, right)
              return left_sum + right_sum
      ```

      Key patterns:
      1. Array-based tree: node i has children 2i and 2i+1, allocated 4*n space
      2. Build recursively: leaves hold array values, internal nodes hold sum of children
      3. Point update: walk down to the leaf, update it, then recompute sums up
      4. Range query: if segment fully outside range return 0, if fully inside return node value, otherwise split
      5. O(log n) for both update and query operations
    tags: [segment-tree, range-query, point-update, divide-and-conquer]
    difficulty: hard

  - query: |
      Write a MinHeap class backed by a list. Support insert, extract_min,
      peek, heapify (build from list), and a size property. Include _sift_up
      and _sift_down helpers.
    solution: |
      ```python
      class MinHeap:
          def __init__(self, items=None):
              self._data = []
              if items:
                  self._data = list(items)
                  self._heapify()

          def _heapify(self):
              for i in range(len(self._data) // 2 - 1, -1, -1):
                  self._sift_down(i)

          def _sift_up(self, index):
              while index > 0:
                  parent = (index - 1) // 2
                  if self._data[index] < self._data[parent]:
                      self._data[index], self._data[parent] = (
                          self._data[parent], self._data[index]
                      )
                      index = parent
                  else:
                      break

          def _sift_down(self, index):
              size = len(self._data)
              while True:
                  smallest = index
                  left = 2 * index + 1
                  right = 2 * index + 2
                  if left < size and self._data[left] < self._data[smallest]:
                      smallest = left
                  if right < size and self._data[right] < self._data[smallest]:
                      smallest = right
                  if smallest == index:
                      break
                  self._data[index], self._data[smallest] = (
                      self._data[smallest], self._data[index]
                  )
                  index = smallest

          def insert(self, value):
              self._data.append(value)
              self._sift_up(len(self._data) - 1)

          def extract_min(self):
              if not self._data:
                  raise IndexError("extract from empty heap")
              if len(self._data) == 1:
                  return self._data.pop()
              root = self._data[0]
              self._data[0] = self._data.pop()
              self._sift_down(0)
              return root

          def peek(self):
              if not self._data:
                  raise IndexError("peek at empty heap")
              return self._data[0]

          @property
          def size(self):
              return len(self._data)
      ```

      Key patterns:
      1. List-based heap: parent at (i-1)//2, children at 2i+1 and 2i+2
      2. _sift_up: swap with parent while smaller, used after insert
      3. _sift_down: swap with smallest child while larger, used after extract
      4. heapify: bottom-up _sift_down from last internal node to root — O(n)
      5. extract_min: swap root with last element, pop, sift down — O(log n)
      6. insert: append to end, sift up — O(log n)
    tags: [heap, min-heap, priority-queue, heapify, sift]
    difficulty: hard
