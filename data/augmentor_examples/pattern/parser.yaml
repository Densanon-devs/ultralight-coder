domain: pattern
category: pattern_parser
examples:
  - query: |
      Write a function `calc(expr)` that evaluates math expressions with +, -, *, /
      and parentheses, respecting operator precedence.
    solution: |
      ```python
      def calc(expr: str) -> float:
          tokens = _tokenize(expr)
          pos = [0]

          def parse_expr():
              result = parse_term()
              while pos[0] < len(tokens) and tokens[pos[0]] in ("+", "-"):
                  op = tokens[pos[0]]
                  pos[0] += 1
                  right = parse_term()
                  result = result + right if op == "+" else result - right
              return result

          def parse_term():
              result = parse_factor()
              while pos[0] < len(tokens) and tokens[pos[0]] in ("*", "/"):
                  op = tokens[pos[0]]
                  pos[0] += 1
                  right = parse_factor()
                  result = result * right if op == "*" else result / right
              return result

          def parse_factor():
              token = tokens[pos[0]]
              if token == "(":
                  pos[0] += 1
                  result = parse_expr()
                  pos[0] += 1  # skip ")"
                  return result
              pos[0] += 1
              return float(token)

          return parse_expr()


      def _tokenize(expr: str) -> list[str]:
          tokens = []
          i = 0
          while i < len(expr):
              if expr[i].isspace():
                  i += 1
              elif expr[i] in "+-*/()":
                  tokens.append(expr[i])
                  i += 1
              else:
                  j = i
                  while j < len(expr) and (expr[j].isdigit() or expr[j] == "."):
                      j += 1
                  tokens.append(expr[i:j])
                  i = j
          return tokens
      ```

      Key: recursive descent with 3 levels (expr -> term -> factor). expr handles +/-, term handles *//, factor handles numbers and parentheses.
    tags: [parser, recursive-descent, expression-evaluator, operator-precedence]
    difficulty: hard

  - query: |
      Write a parse_json(text) function that parses a JSON string into Python
      objects (dict, list, str, int, float, bool, None) without using the
      json module. Handle nested structures and escaped characters in strings.
    solution: |
      ```python
      def parse_json(text: str):
          pos = [0]

          def skip_ws():
              while pos[0] < len(text) and text[pos[0]] in " \t\n\r":
                  pos[0] += 1

          def parse_value():
              skip_ws()
              ch = text[pos[0]]
              if ch == '"':
                  return parse_string()
              if ch == '{':
                  return parse_object()
              if ch == '[':
                  return parse_array()
              if ch == 't':
                  pos[0] += 4
                  return True
              if ch == 'f':
                  pos[0] += 5
                  return False
              if ch == 'n':
                  pos[0] += 4
                  return None
              return parse_number()

          def parse_string() -> str:
              pos[0] += 1  # skip opening "
              parts = []
              escapes = {'n': '\n', 't': '\t', 'r': '\r', '\\': '\\', '"': '"', '/': '/'}
              while text[pos[0]] != '"':
                  if text[pos[0]] == '\\':
                      pos[0] += 1
                      ch = text[pos[0]]
                      if ch == 'u':
                          hex_str = text[pos[0]+1:pos[0]+5]
                          parts.append(chr(int(hex_str, 16)))
                          pos[0] += 5
                      else:
                          parts.append(escapes.get(ch, ch))
                          pos[0] += 1
                  else:
                      parts.append(text[pos[0]])
                      pos[0] += 1
              pos[0] += 1  # skip closing "
              return "".join(parts)

          def parse_number():
              start = pos[0]
              if text[pos[0]] == '-':
                  pos[0] += 1
              while pos[0] < len(text) and text[pos[0]].isdigit():
                  pos[0] += 1
              is_float = False
              if pos[0] < len(text) and text[pos[0]] == '.':
                  is_float = True
                  pos[0] += 1
                  while pos[0] < len(text) and text[pos[0]].isdigit():
                      pos[0] += 1
              if pos[0] < len(text) and text[pos[0]] in 'eE':
                  is_float = True
                  pos[0] += 1
                  if pos[0] < len(text) and text[pos[0]] in '+-':
                      pos[0] += 1
                  while pos[0] < len(text) and text[pos[0]].isdigit():
                      pos[0] += 1
              num_str = text[start:pos[0]]
              return float(num_str) if is_float else int(num_str)

          def parse_object() -> dict:
              pos[0] += 1  # skip {
              result = {}
              skip_ws()
              if text[pos[0]] == '}':
                  pos[0] += 1
                  return result
              while True:
                  skip_ws()
                  key = parse_string()
                  skip_ws()
                  pos[0] += 1  # skip :
                  value = parse_value()
                  result[key] = value
                  skip_ws()
                  if text[pos[0]] == '}':
                      pos[0] += 1
                      return result
                  pos[0] += 1  # skip ,

          def parse_array() -> list:
              pos[0] += 1  # skip [
              result = []
              skip_ws()
              if text[pos[0]] == ']':
                  pos[0] += 1
                  return result
              while True:
                  result.append(parse_value())
                  skip_ws()
                  if text[pos[0]] == ']':
                      pos[0] += 1
                      return result
                  pos[0] += 1  # skip ,

          return parse_value()
      ```

      Key: recursive descent parser with pos as mutable list for shared state.
      Each parse_* function advances pos. Strings handle escape sequences
      including \uXXXX unicode. Numbers detect float via '.' or 'e'/'E'.
    tags: [parser, json, recursive-descent, escape-sequences, string-parsing]
    difficulty: hard

  - query: |
      Write a parse_ini(text) function that parses INI file format into a
      nested dict. Support sections [section], key=value pairs, comments
      (lines starting with ; or #), and multiline values with continuation
      lines (leading whitespace).
    solution: |
      ```python
      def parse_ini(text: str) -> dict:
          result = {}
          current_section = None
          current_key = None
          lines = text.split("\n")
          i = 0
          while i < len(lines):
              line = lines[i]
              stripped = line.strip()
              # Skip blank lines and comments
              if not stripped or stripped[0] in ";#":
                  i += 1
                  continue
              # Section header
              if stripped.startswith("[") and stripped.endswith("]"):
                  current_section = stripped[1:-1].strip()
                  result.setdefault(current_section, {})
                  current_key = None
                  i += 1
                  continue
              # Continuation line (starts with whitespace)
              if line[0] in " \t" and current_key and current_section:
                  result[current_section][current_key] += "\n" + stripped
                  i += 1
                  continue
              # Key = value
              if "=" in stripped:
                  key, _, value = stripped.partition("=")
                  key = key.strip()
                  value = value.strip()
                  # Remove inline comments
                  for comment_char in (";", "#"):
                      idx = value.find(comment_char)
                      if idx >= 0 and (idx == 0 or value[idx-1] == " "):
                          value = value[:idx].rstrip()
                  if current_section is None:
                      current_section = "__global__"
                      result.setdefault(current_section, {})
                  result[current_section][key] = value
                  current_key = key
              i += 1
          return result
      ```

      Key: line-by-line parsing with state tracking (current_section, current_key).
      Sections create nested dicts. Continuation lines (leading whitespace)
      append to previous key's value. Keys without a section go into __global__.
      Inline comments are stripped after value.
    tags: [parser, ini, config, line-parser, sections]
    difficulty: medium

  - query: |
      Write a simple regex engine that supports: literal chars, '.' (any char),
      '*' (zero or more of previous), '+' (one or more of previous), and
      '?' (zero or one of previous). Return True if pattern matches the full
      string.
    solution: |
      ```python
      def match(pattern: str, text: str) -> bool:
          """Match pattern against full text."""
          tokens = _parse_regex(pattern)
          return _match_tokens(tokens, text, 0)


      def _parse_regex(pattern: str) -> list:
          """Parse pattern into list of (type, char) tokens with quantifiers."""
          tokens = []
          i = 0
          while i < len(pattern):
              ch = pattern[i]
              quantifier = None
              if i + 1 < len(pattern) and pattern[i + 1] in "*+?":
                  quantifier = pattern[i + 1]
                  i += 2
              else:
                  i += 1
              tokens.append((ch, quantifier))
          return tokens


      def _char_matches(pattern_ch: str, text_ch: str) -> bool:
          if pattern_ch == ".":
              return True
          return pattern_ch == text_ch


      def _match_tokens(tokens: list, text: str, pos: int) -> bool:
          if not tokens:
              return pos == len(text)

          ch, quantifier = tokens[0]
          rest = tokens[1:]

          if quantifier is None:
              # Must match exactly one character
              if pos < len(text) and _char_matches(ch, text[pos]):
                  return _match_tokens(rest, text, pos + 1)
              return False

          if quantifier == "?":
              # Zero occurrences
              if _match_tokens(rest, text, pos):
                  return True
              # One occurrence
              if pos < len(text) and _char_matches(ch, text[pos]):
                  return _match_tokens(rest, text, pos + 1)
              return False

          if quantifier == "*":
              # Try zero, then one, then two, etc. (lazy-style via recursion)
              if _match_tokens(rest, text, pos):
                  return True
              if pos < len(text) and _char_matches(ch, text[pos]):
                  return _match_tokens(tokens, text, pos + 1)
              return False

          if quantifier == "+":
              # Must match at least once
              if pos < len(text) and _char_matches(ch, text[pos]):
                  # Try continuing with *, or move to rest
                  if _match_tokens(rest, text, pos + 1):
                      return True
                  return _match_tokens(tokens[:1][0:0] + [(ch, "*")] + rest,
                                       text, pos + 1)
              return False

          return False
      ```

      Key: two-phase approach - parse pattern into tokens with quantifiers, then
      recursive backtracking match. '*' tries zero matches first (lazy), then
      advances one char and recurses. '+' requires at least one match then acts
      like '*'. '?' tries zero then one match.
    tags: [parser, regex, backtracking, pattern-matching, recursive]
    difficulty: hard

  - query: |
      Write a calc_with_vars(expr, variables) function that evaluates arithmetic
      expressions supporting variables, assignment (x = expr), and all basic
      operators (+, -, *, /, parentheses). Variables is a mutable dict.
    solution: |
      ```python
      def calc_with_vars(expr: str, variables: dict) -> float:
          tokens = _tokenize_expr(expr)
          pos = [0]

          def peek():
              return tokens[pos[0]] if pos[0] < len(tokens) else None

          def consume():
              tok = tokens[pos[0]]
              pos[0] += 1
              return tok

          # Check for assignment: name = expr
          if (len(tokens) >= 3 and tokens[0].isidentifier()
                  and tokens[1] == "="):
              name = consume()
              consume()  # skip =
              value = parse_expr()
              variables[name] = value
              return value

          def parse_expr():
              result = parse_term()
              while peek() in ("+", "-"):
                  op = consume()
                  right = parse_term()
                  result = result + right if op == "+" else result - right
              return result

          def parse_term():
              result = parse_unary()
              while peek() in ("*", "/"):
                  op = consume()
                  right = parse_unary()
                  result = result * right if op == "*" else result / right
              return result

          def parse_unary():
              if peek() == "-":
                  consume()
                  return -parse_factor()
              return parse_factor()

          def parse_factor():
              tok = consume()
              if tok == "(":
                  result = parse_expr()
                  consume()  # skip )
                  return result
              if tok.replace(".", "", 1).lstrip("-").isdigit():
                  return float(tok)
              if tok in variables:
                  return float(variables[tok])
              raise NameError(f"Undefined variable: {tok}")

          return parse_expr()


      def _tokenize_expr(expr: str) -> list[str]:
          tokens = []
          i = 0
          while i < len(expr):
              if expr[i].isspace():
                  i += 1
              elif expr[i] in "+-*/()=":
                  tokens.append(expr[i])
                  i += 1
              elif expr[i].isdigit() or expr[i] == ".":
                  j = i
                  while j < len(expr) and (expr[j].isdigit() or expr[j] == "."):
                      j += 1
                  tokens.append(expr[i:j])
                  i = j
              elif expr[i].isalpha() or expr[i] == "_":
                  j = i
                  while j < len(expr) and (expr[j].isalnum() or expr[j] == "_"):
                      j += 1
                  tokens.append(expr[i:j])
                  i = j
              else:
                  i += 1
          return tokens
      ```

      Key: extends basic calc with variable lookup and assignment. Tokenizer
      handles identifiers (alpha + digits). Assignment detected by checking
      first two tokens before parsing. parse_unary adds unary minus support.
      Variables dict is mutated in-place for assignment.
    tags: [parser, expression, variables, assignment, recursive-descent]
    difficulty: hard

  - query: |
      Write a `parse_csv(text, delimiter, quote_char)` function that parses CSV text into a list of rows (list of lists of strings). Handle quoted fields containing delimiters, newlines, and escaped quotes (doubled quote characters). Support custom delimiter and quote character.
    solution: |
      ```python
      def parse_csv(
          text: str,
          delimiter: str = ",",
          quote_char: str = '"',
      ) -> list[list[str]]:
          rows: list[list[str]] = []
          row: list[str] = []
          field: list[str] = []
          in_quotes = False
          i = 0

          while i < len(text):
              ch = text[i]

              if in_quotes:
                  if ch == quote_char:
                      # Check for escaped quote (doubled)
                      if i + 1 < len(text) and text[i + 1] == quote_char:
                          field.append(quote_char)
                          i += 2
                          continue
                      else:
                          in_quotes = False
                          i += 1
                          continue
                  else:
                      field.append(ch)
                      i += 1
              else:
                  if ch == quote_char:
                      in_quotes = True
                      i += 1
                  elif ch == delimiter:
                      row.append("".join(field))
                      field = []
                      i += 1
                  elif ch == "\n":
                      row.append("".join(field))
                      field = []
                      rows.append(row)
                      row = []
                      i += 1
                      # Skip \r\n
                  elif ch == "\r":
                      i += 1
                      continue
                  else:
                      field.append(ch)
                      i += 1

          # Final field and row
          if field or row:
              row.append("".join(field))
              rows.append(row)

          return rows
      ```

      Key patterns: State machine with in_quotes flag. Doubled quote characters are treated as escaped quotes. Delimiters and newlines inside quotes are literal. \r is skipped to handle both \n and \r\n line endings. Final row is flushed if text doesn't end with a newline.
    tags: [parser, csv, state-machine, quoting, escape-sequences]
    difficulty: medium

  - query: |
      Write a `parse_markdown_inline(text)` function that parses inline Markdown formatting: `**bold**`, `*italic*`, `` `code` ``, and `~~strikethrough~~`. Return a list of dicts with `type` ("text", "bold", "italic", "code", "strikethrough") and `content` keys.
    solution: |
      ```python
      def parse_markdown_inline(text: str) -> list[dict]:
          tokens: list[dict] = []
          i = 0
          buf: list[str] = []

          def flush_text():
              if buf:
                  tokens.append({"type": "text", "content": "".join(buf)})
                  buf.clear()

          while i < len(text):
              # Code (backtick) -- check first to avoid nesting issues
              if text[i] == "`":
                  flush_text()
                  end = text.index("`", i + 1)
                  tokens.append({"type": "code", "content": text[i + 1:end]})
                  i = end + 1
              # Strikethrough ~~
              elif text[i:i + 2] == "~~":
                  flush_text()
                  end = text.index("~~", i + 2)
                  tokens.append({
                      "type": "strikethrough",
                      "content": text[i + 2:end],
                  })
                  i = end + 2
              # Bold **
              elif text[i:i + 2] == "**":
                  flush_text()
                  end = text.index("**", i + 2)
                  tokens.append({"type": "bold", "content": text[i + 2:end]})
                  i = end + 2
              # Italic *
              elif text[i] == "*":
                  flush_text()
                  end = text.index("*", i + 1)
                  tokens.append({"type": "italic", "content": text[i + 1:end]})
                  i = end + 1
              else:
                  buf.append(text[i])
                  i += 1

          flush_text()
          return tokens
      ```

      Key patterns: Scan left-to-right, checking multi-character markers (**, ~~) before single-character (*). Backtick code spans are handled first to prevent formatting inside code. Accumulate plain text in a buffer and flush before each formatted span. Returns structured token list for downstream rendering.
    tags: [parser, markdown, inline-formatting, tokenizer, state-machine]
    difficulty: medium

  - query: |
      Write a `parse_sexp(text)` function that parses S-expressions (Lisp-style) into nested Python lists. Atoms are returned as strings or numbers. For example, `(+ 1 (* 2 3))` becomes `["+", 1, ["*", 2, 3]]`. Handle quoted strings with escape characters.
    solution: |
      ```python
      def parse_sexp(text: str):
          tokens = _tokenize_sexp(text)
          pos = [0]

          def parse():
              token = tokens[pos[0]]
              if token == "(":
                  pos[0] += 1
                  lst = []
                  while tokens[pos[0]] != ")":
                      lst.append(parse())
                  pos[0] += 1  # skip )
                  return lst
              else:
                  pos[0] += 1
                  return _convert_atom(token)

          result = parse()
          return result


      def _tokenize_sexp(text: str) -> list[str]:
          tokens: list[str] = []
          i = 0
          while i < len(text):
              ch = text[i]
              if ch in " \t\n\r":
                  i += 1
              elif ch in "()":
                  tokens.append(ch)
                  i += 1
              elif ch == '"':
                  # Quoted string
                  j = i + 1
                  parts: list[str] = []
                  while j < len(text) and text[j] != '"':
                      if text[j] == "\\":
                          j += 1
                          esc = {"n": "\n", "t": "\t", "\\": "\\", '"': '"'}
                          parts.append(esc.get(text[j], text[j]))
                      else:
                          parts.append(text[j])
                      j += 1
                  tokens.append('"' + "".join(parts) + '"')
                  i = j + 1
              elif ch == ";":
                  # Line comment
                  while i < len(text) and text[i] != "\n":
                      i += 1
              else:
                  # Atom (symbol or number)
                  j = i
                  while j < len(text) and text[j] not in " \t\n\r()\"":
                      j += 1
                  tokens.append(text[i:j])
                  i = j
          return tokens


      def _convert_atom(token: str):
          """Convert a token string to a number if possible, else return as string."""
          if token.startswith('"') and token.endswith('"'):
              return token[1:-1]
          try:
              return int(token)
          except ValueError:
              pass
          try:
              return float(token)
          except ValueError:
              pass
          return token
      ```

      Key patterns: Two-phase approach -- tokenize then parse. Tokenizer handles whitespace, parens, quoted strings with escapes, and line comments starting with ;. Parser recursively builds nested lists for each (...) form. _convert_atom coerces numeric strings to int/float, otherwise returns the symbol as a string.
    tags: [parser, s-expression, lisp, recursive-descent, tokenizer]
    difficulty: hard
