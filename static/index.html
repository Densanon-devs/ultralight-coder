<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultralight Code Assistant</title>
<style>
  :root {
    --bg: #1a1b26; --surface: #24283b; --surface2: #2f3346;
    --text: #c0caf5; --dim: #565f89; --accent: #7aa2f7;
    --green: #9ece6a; --red: #f7768e; --yellow: #e0af68;
    --border: #3b4261; --code-bg: #1e2030;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
  }

  /* Header */
  header {
    padding: 12px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .status {
    font-size: 12px; color: var(--dim);
    display: flex; align-items: center; gap: 6px;
  }
  header .status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim); display: inline-block;
  }
  header .status .dot.ready { background: var(--green); }
  header .status .dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  header .spacer { flex: 1; }
  header button.new-chat {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer;
    font-weight: 500;
  }
  header button.new-chat:hover { border-color: var(--accent); color: var(--accent); }
  header select {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
  }

  /* Chat area */
  #chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg { max-width: 85%; line-height: 1.6; }
  .msg.user {
    align-self: flex-end; background: var(--accent); color: #1a1b26;
    padding: 10px 16px; border-radius: 16px 16px 4px 16px;
    font-size: 14px; white-space: pre-wrap;
  }
  .msg.bot {
    align-self: flex-start; background: var(--surface);
    padding: 16px; border-radius: 4px 16px 16px 16px;
    font-size: 14px; border: 1px solid var(--border);
  }
  .msg.bot .meta {
    font-size: 11px; color: var(--dim); margin-top: 8px;
    border-top: 1px solid var(--border); padding-top: 6px;
  }
  .msg.system {
    align-self: center; color: var(--dim); font-size: 12px;
    font-style: italic;
  }

  /* Code blocks */
  .msg.bot pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; margin: 8px 0;
    overflow-x: auto; font-size: 13px; line-height: 1.5;
  }
  .msg.bot code { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }
  .msg.bot p { margin: 6px 0; }

  /* Copy button */
  .code-wrap { position: relative; }
  .copy-btn {
    position: absolute; top: 6px; right: 6px;
    background: var(--surface2); color: var(--dim); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px; font-size: 11px;
    cursor: pointer; opacity: 0; transition: opacity 0.2s;
  }
  .code-wrap:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--text); }
  .copy-btn.copied { color: var(--green); }

  /* Code input area */
  #code-area {
    padding: 0 20px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
    display: none;
  }
  #code-area.open { display: block; padding-top: 10px; }
  #code-input {
    width: 100%; background: var(--code-bg); color: var(--green);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    resize: vertical; min-height: 60px; max-height: 300px;
    line-height: 1.5;
  }
  #code-input:focus { outline: none; border-color: var(--accent); }
  #code-input::placeholder { color: var(--dim); }
  #code-toggle-row {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
  }
  #code-toggle {
    background: none; color: var(--dim); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 10px; font-size: 11px;
    cursor: pointer;
  }
  #code-toggle:hover { color: var(--text); border-color: var(--accent); }
  #code-toggle.active { color: var(--accent); border-color: var(--accent); }

  /* Input area */
  #input-area {
    padding: 12px 20px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #prompt {
    flex: 1; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; font-size: 14px; font-family: inherit;
    resize: none; min-height: 44px; max-height: 200px;
    line-height: 1.5;
  }
  #prompt:focus { outline: none; border-color: var(--accent); }
  #prompt::placeholder { color: var(--dim); }
  #send {
    background: var(--accent); color: #1a1b26; border: none;
    border-radius: 10px; padding: 10px 20px; font-size: 14px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    height: 44px;
  }
  #send:hover { filter: brightness(1.1); }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #input-hint {
    font-size: 11px; color: var(--dim); margin-top: 4px; text-align: right;
  }

  /* Welcome */
  #welcome {
    text-align: center; padding: 60px 20px; color: var(--dim);
  }
  #welcome h2 { color: var(--text); font-size: 20px; margin-bottom: 8px; }
  #welcome p { font-size: 14px; margin-bottom: 20px; }
  .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .examples button {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 13px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .examples button:hover { border-color: var(--accent); }

  /* Spinner */
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--dim);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
</style>
</head>
<body>

<header>
  <h1>Ultralight Code Assistant</h1>
  <div class="status">
    <span class="dot loading" id="status-dot"></span>
    <span id="status-text">Loading...</span>
  </div>
  <div class="spacer"></div>
  <button class="new-chat" onclick="newChat()" title="Start a new conversation">New Chat</button>
  <select id="model-select" title="Select model" onchange="switchModel(this.value)"></select>
</header>

<div id="chat">
  <div id="welcome">
    <h2>Local AI Coding Assistant</h2>
    <p>Ask me to write, review, debug, or explain code. Everything runs on your machine.</p>
    <div class="examples">
      <button onclick="useExample(this)">Write a FastAPI REST endpoint</button>
      <button onclick="useExample(this)">Create a SQLite CRUD class</button>
      <button onclick="useExample(this)">Write pytest fixtures for a database</button>
      <button onclick="useExample(this)">Build an async producer-consumer</button>
      <button onclick="useExample(this)">Explain what decorators do</button>
      <button onclick="useExample(this)">Write a CLI tool with argparse</button>
    </div>
  </div>
</div>

<div id="code-area">
  <textarea id="code-input" rows="4" placeholder="Paste your code here..."></textarea>
</div>

<div id="input-area">
  <div id="input-row">
    <button id="code-toggle" onclick="toggleCode()" title="Attach code for review/debug">{ }</button>
    <textarea id="prompt" rows="1" placeholder="Ask me to write some code..."
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="send()">Send</button>
  </div>
  <div id="input-hint">Enter to send, Shift+Enter for new line</div>
</div>

<script>
const chat = document.getElementById('chat');
const prompt = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const modelSelect = document.getElementById('model-select');
const codeArea = document.getElementById('code-area');
const codeInput = document.getElementById('code-input');
const codeToggle = document.getElementById('code-toggle');
let busy = false;

// ── Status check ──
async function checkStatus() {
  try {
    const r = await fetch('/status');
    const data = await r.json();
    statusDot.className = 'dot ready';
    const model = data.model_name || 'ready';
    statusText.textContent = model;
    return true;
  } catch {
    statusDot.className = 'dot loading';
    statusText.textContent = 'Loading model...';
    return false;
  }
}

// ── Model list ──
async function loadModels() {
  try {
    const r = await fetch('/models/available');
    const data = await r.json();
    modelSelect.innerHTML = '';
    for (const m of data.models) {
      const opt = document.createElement('option');
      opt.value = m.path;
      opt.textContent = `${m.name} (${m.size_mb}MB)`;
      if (m.active) opt.selected = true;
      modelSelect.appendChild(opt);
    }
  } catch {
    modelSelect.innerHTML = '<option>default model</option>';
  }
}

// ── Switch model ──
async function switchModel(path) {
  if (!path || busy) return;
  statusDot.className = 'dot loading';
  statusText.textContent = 'Switching model...';
  try {
    const r = await fetch('/models/switch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path}),
    });
    const data = await r.json();
    if (data.error) {
      statusText.textContent = data.error;
    } else {
      statusText.textContent = data.model;
      statusDot.className = 'dot ready';
    }
  } catch {
    statusText.textContent = 'Switch failed';
  }
}

// ── New Chat ──
async function newChat() {
  try { await fetch('/session/reset', {method: 'POST'}); } catch {}
  chat.innerHTML = `
    <div id="welcome">
      <h2>Local AI Coding Assistant</h2>
      <p>Ask me to write, review, debug, or explain code. Everything runs on your machine.</p>
      <div class="examples">
        <button onclick="useExample(this)">Write a FastAPI REST endpoint</button>
        <button onclick="useExample(this)">Create a SQLite CRUD class</button>
        <button onclick="useExample(this)">Write pytest fixtures for a database</button>
        <button onclick="useExample(this)">Build an async producer-consumer</button>
        <button onclick="useExample(this)">Explain what decorators do</button>
        <button onclick="useExample(this)">Write a CLI tool with argparse</button>
      </div>
    </div>`;
  // Close code area
  codeArea.classList.remove('open');
  codeToggle.classList.remove('active');
  codeInput.value = '';
}

// ── Code toggle ──
function toggleCode() {
  codeArea.classList.toggle('open');
  codeToggle.classList.toggle('active');
  if (codeArea.classList.contains('open')) codeInput.focus();
}

// ── Send message (streaming) ──
async function send() {
  const text = prompt.value.trim();
  if (!text || busy) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Gather code attachment
  const code = codeArea.classList.contains('open') ? codeInput.value.trim() : '';

  // User message
  if (code) {
    addMsg(text + '\n\n[code attached]', 'user');
  } else {
    addMsg(text, 'user');
  }
  prompt.value = '';
  autoResize(prompt);

  // Clear code area after sending
  if (code) {
    codeInput.value = '';
    codeArea.classList.remove('open');
    codeToggle.classList.remove('active');
  }

  busy = true;
  sendBtn.disabled = true;
  const start = performance.now();

  // Try streaming first, fall back to non-streaming
  const body = {prompt: text};
  if (code) body.code = code;

  try {
    const r = await fetch('/generate/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });

    if (!r.ok || !r.body) {
      // Fallback to non-streaming
      await sendNonStreaming(text, body, start);
      return;
    }

    const botDiv = document.createElement('div');
    botDiv.className = 'msg bot';
    botDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    chat.appendChild(botDiv);
    chat.scrollTop = chat.scrollHeight;

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let firstToken = true;
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line in buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') continue;

        try {
          const {token} = JSON.parse(payload);
          if (firstToken) {
            botDiv.innerHTML = '';
            firstToken = false;
          }
          fullText += token;
          botDiv.innerHTML = renderMarkdown(fullText);
          chat.scrollTop = chat.scrollHeight;
        } catch {}
      }
    }

    // Finalize: add copy buttons and meta
    const elapsed = ((performance.now() - start) / 1000).toFixed(1);
    botDiv.innerHTML = renderMarkdown(fullText);
    addCopyButtons(botDiv);
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    metaDiv.textContent = `${elapsed}s total`;
    botDiv.appendChild(metaDiv);
    chat.scrollTop = chat.scrollHeight;
  } catch (err) {
    // Fallback to non-streaming
    await sendNonStreaming(text, body, start);
    return;
  }

  busy = false;
  sendBtn.disabled = false;
  prompt.focus();
}

async function sendNonStreaming(text, body, start) {
  const typing = addTyping();
  try {
    const r = await fetch('/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await r.json();
    const elapsed = ((performance.now() - start) / 1000).toFixed(1);
    typing.remove();
    addBotMsg(data.response, {
      time: elapsed,
      modules: data.modules,
      generation_time: data.generation_time,
    });
  } catch (err) {
    typing.remove();
    addMsg('Connection error. Is the server running?', 'system');
  }
  busy = false;
  sendBtn.disabled = false;
  prompt.focus();
}

// ── Message rendering ──
function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addBotMsg(text, meta) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = renderMarkdown(text);
  addCopyButtons(div);

  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    const parts = [];
    if (meta.generation_time) parts.push(`${meta.generation_time}s generation`);
    if (meta.modules?.length) parts.push(meta.modules.join(', '));
    if (meta.time) parts.push(`${meta.time}s total`);
    metaDiv.textContent = parts.join('  |  ');
    div.appendChild(metaDiv);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addCopyButtons(div) {
  div.querySelectorAll('pre').forEach(pre => {
    if (pre.parentNode.classList.contains('code-wrap')) return;
    const wrap = document.createElement('div');
    wrap.className = 'code-wrap';
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'copy';
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.textContent);
      btn.textContent = 'copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
    };
    wrap.appendChild(btn);
  });
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ── Simple markdown → HTML ──
function renderMarkdown(text) {
  // Code blocks: ```lang\n...\n```
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Split into paragraphs (skip inside pre)
  const parts = text.split(/(<pre>[\s\S]*?<\/pre>)/);
  return parts.map(p => {
    if (p.startsWith('<pre>')) return p;
    return p.split('\n\n').map(para => `<p>${para.replace(/\n/g, '<br>')}</p>`).join('');
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Input handling ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function useExample(btn) {
  prompt.value = btn.textContent;
  prompt.focus();
  send();
}

// ── Init ──
checkStatus().then(() => loadModels());
setInterval(checkStatus, 10000);
</script>
</body>
</html>
